services:
  app-v1:
    build: .
    container_name: app-v1-container
    ports:
      - "7001:7000"
    environment:
      - APP_VERSION=v1

  app-v2:
    build: .
    container_name: app-v2-container
    ports:
      - "7002:7000"
    environment:
      - APP_VERSION=v2

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - ./:/etc/nginx/conf.d/
    depends_on:
      - app-v1
      - app-v2
